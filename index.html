<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b12">
<title>TopBattleFR — Game Studio TikTok</title>
<script>
window.addEventListener('error',function(e){try{var d=document.getElementById('errbar');if(!d){d=document.createElement('div');d.id='errbar';d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#7f1d1d;color:#fff;font:12px monospace;padding:10px;white-space:pre-wrap';document.body.appendChild(d);}d.textContent+='ERREUR: '+(e.message||e.type)+' (ligne '+(e.lineno||'?')+')\n';}catch(x){}},true);
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{color-scheme:dark}body{background:#0b0b12;color:#f2f2f5;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;min-height:100vh}.hidden{display:none!important}code{background:#ffffff14;padding:2px 8px;border-radius:6px;font-size:.85em}#hub{max-width:1100px;margin:0 auto;padding:36px 20px 60px}#hub header .eyebrow{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:3px;color:#9a97ab;margin-bottom:10px}.recdot{width:10px;height:10px;border-radius:50%;background:#e11d48;box-shadow:0 0 12px #e11d48;animation:recpulse 1.6s infinite}@keyframes recpulse{50%{opacity:.35}}@media(prefers-reduced-motion:reduce){.recdot,#recbtn.rec-on{animation:none}}#hub header h1{font-size:clamp(34px,5vw,52px);letter-spacing:4px;color:#f5f2e8}#hub header p{margin:12px 0 18px;color:#b7b7c4;line-height:1.55}.handle-box{display:inline-flex;gap:10px;align-items:center;color:#b7b7c4;font-size:14px}.handle-box input{background:#16161f;color:#fff;border:1px solid #33334a;border-radius:10px;padding:8px 14px;font-size:15px;width:200px}#grid{display:grid;gap:20px;margin-top:30px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}.card{position:relative;background:#14141d;border:1px solid #262637;border-top:4px solid var(--acc);border-radius:18px;padding:22px 22px 18px;transition:transform .15s ease,box-shadow .15s ease}.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px -18px var(--acc)}.card-badge{position:absolute;top:14px;right:18px;font-size:30px}.card h2{font-size:24px;letter-spacing:1px;color:var(--acc)}.card .tagline{margin-top:6px;color:#d6d6e2;font-size:15px;line-height:1.4}.card .da{margin-top:10px;color:#8a8a9d;font-size:13px;font-style:italic}.card .meta{display:flex;gap:14px;margin-top:14px;color:#8a8a9d;font-size:13px}.card .actions{display:flex;gap:10px;margin-top:16px}#hub footer{margin-top:40px;color:#8a8a9d;font-size:13px;line-height:1.6}.btn{background:#1d1d2a;color:#fff;border:1px solid #33334a;border-radius:12px;padding:10px 16px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}.btn:hover{background:#262637}.card .btn.rec{background:var(--acc);color:#101016;border-color:transparent}.btn.round{width:54px;height:54px;border-radius:50%;justify-content:center;font-size:20px;padding:0}.btn.dl{background:#22c55e;color:#08130b;border-color:transparent}.btn.active{outline:2px solid #ffd15c}#recbtn.rec-on{background:#e11d48;animation:blink 1s infinite}@keyframes blink{50%{opacity:.55}}#stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 30px;gap:12px}.topbar{width:100%;max-width:620px;display:flex;align-items:center;gap:14px}.topbar #gtitle{font-weight:900;letter-spacing:1px;color:var(--acc, #ffd15c);font-size:18px;flex:1}.topbar #eplabel{color:#8a8a9d;font-size:13px;font-weight:700}.canvas-wrap{flex:1;display:flex;justify-content:center;width:100%}#cv{height:min(78vh,1200px);aspect-ratio:9 / 16;width:auto;max-width:96vw;border-radius:22px;background:#000;box-shadow:0 20px 80px -30px #000000e6,0 0 0 1px #262637}.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}.btn.cine{background:#33245c;border-color:#5b3fa8}.btn.share{background:#1d4ed8;border-color:transparent}.btn.escape{background:#b45309;border-color:transparent;color:#fff;margin-top:14px;text-align:left;line-height:1.35}.topbar .btn.escape{margin-top:0}#opts{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}#opts .opt{display:flex;gap:8px;align-items:center;color:#b7b7c4;font-size:14px}#opts select{background:#16161f;color:#fff;border:1px solid #33334a;border-radius:10px;padding:8px 12px;font-size:14px}#stage.cinema{padding:0;gap:0;background:#000}#stage.cinema .topbar,#stage.cinema .controls,#stage.cinema #opts{display:none}#stage.cinema .canvas-wrap{position:fixed;inset:0;z-index:50;background:#000;display:flex;align-items:center;justify-content:center}#stage.cinema #cv{height:100vh;height:100dvh;max-width:100vw;border-radius:0;box-shadow:none}#preview{position:fixed;inset:0;z-index:100;background:#040408f5;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 12px calc(14px + env(safe-area-inset-bottom,0px));overflow:auto}.preview-box{display:flex;flex-direction:column;gap:12px;align-items:center;max-width:480px;width:100%;flex:1;min-height:0}#pv{width:auto;max-width:100%;flex:1;min-height:120px;max-height:55vh;max-height:55dvh;aspect-ratio:9 / 16;border-radius:18px;background:#000}.preview-box .tip{color:#b7b7c4;font-size:14px;font-weight:700}.preview-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}.preview-actions .btn{justify-content:center;padding:16px 10px;font-size:17px}.preview-actions .btn.share{grid-column:1 / -1;padding:18px 10px;font-size:19px}#toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%);z-index:200;max-width:90vw;background:#14532d;color:#fff;font-size:15px;font-weight:700;border-radius:14px;padding:14px 20px;text-align:center;box-shadow:0 10px 40px #0009}#toast.err{background:#7f1d1d}#cinevid{position:fixed;width:2px;height:2px;left:-10px;top:-10px;opacity:.01;pointer-events:none}@media(max-width:700px),(pointer:coarse){.btn{padding:13px 18px;font-size:16px}.btn.round{width:62px;height:62px;font-size:24px}#hub{padding:14px 14px 30px}#hub header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}#hub header .eyebrow{margin:0}.handle-box input{width:150px;padding:7px 12px}#grid{margin-top:14px;gap:12px}.card{padding:16px 16px 14px}.card .tagline,.card .da,.card .meta{display:none}.card h2{font-size:22px}.card .actions{margin-top:12px}.card .actions .btn{flex:1;justify-content:center}#stage{padding:8px 6px 24px;gap:8px}#cv{height:min(72vh,1200px)}#opts .opt>span{display:none}}
</style>
</head>
<body>
<div id="hub">
  <header>
    <p class="eyebrow"><span class="recdot"></span>GAME STUDIO <span id="ver"></span></p>
    <label class="handle-box"><input id="handle" placeholder="@topbattlefr" maxlength="30"></label>
    <button class="btn escape hidden">↗ OUVRIR EN GRAND</button>
  </header>
  <div id="grid"></div>
</div>

<div id="stage" class="hidden">
  <div class="topbar">
    <button id="back" class="btn">← Studio</button>
    <span id="gtitle"></span>
    <span id="eplabel"></span>
    <button class="btn escape hidden">↗ Ouvrir en grand</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
  <div class="controls">
    <button id="playbtn" class="btn round" title="Lecture / pause">▶</button>
    <button id="reseed" class="btn round" title="Nouvel épisode (nouveau tirage)">🔀</button>
    <button id="recbtn" class="btn round" title="Enregistrer la vidéo">⏺</button>
    <button id="mute" class="btn round" title="Son">🔊</button>
    <button id="safe" class="btn round" title="Zones TikTok (icônes / légende)">📐</button>
    <button id="cinemabtn" class="btn round cine" title="Plein écran sans interface (enregistrement d'écran)">🎥</button>
  </div>
  <div class="controls">
    <button id="sharebtn" class="btn share hidden">📤 Partager</button>
    <button id="prevbtn" class="btn hidden">👁 Voir</button>
    <a id="dl" class="btn dl hidden" href="#">⬇ MP4</a>
  </div>
  <div id="opts"></div>
  <video id="cinevid" playsinline muted></video>
</div>

<div id="preview" class="hidden">
  <div class="preview-box">
    <video id="pv" playsinline controls loop></video>
    <p class="tip">📤 → Galerie ou TikTok</p>
    <div class="preview-actions">
      <button id="pshare" class="btn share">📤 Partager</button>
      <a id="pdl" class="btn dl" href="#">⬇ MP4</a>
      <button id="popen" class="btn">↗</button>
      <button id="pclose" class="btn">✕</button>
    </div>
  </div>
</div>
